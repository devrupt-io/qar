# Qar Configuration File
# This file is used by native Linux package installs.
# Values here can be overridden by environment variables.
#
# For Docker deployments, use .env instead (or set environment variables
# directly in docker-compose.yml).

# --------------------------------------------------------------------------
# Database
# --------------------------------------------------------------------------
# Dialect: "sqlite" (default for native installs) or "postgres"
DB_DIALECT=sqlite

# SQLite database path (only used when DB_DIALECT=sqlite)
SQLITE_PATH=/qar/data/qar.db

# PostgreSQL connection URL (only used when DB_DIALECT=postgres)
# DATABASE_URL=postgres://qar:qar_password@localhost:5432/qar

# --------------------------------------------------------------------------
# Services
# --------------------------------------------------------------------------
# Service ports are configured in their respective systemd unit files:
#   Backend:  /usr/lib/systemd/system/qar-backend.service  (default: 3001)
#   Frontend: /usr/lib/systemd/system/qar-frontend.service (default: 3000)

# Jellyfin URL
JELLYFIN_URL=http://127.0.0.1:8096

# Jellyfin media path: where Jellyfin sees the content directory
# In Docker this is /media (volume mount), in native installs use CONTENT_PATH
JELLYFIN_MEDIA_PATH=/qar/content

# QBittorrent URL
QBITTORRENT_URL=http://127.0.0.1:8888

# --------------------------------------------------------------------------
# Paths
# --------------------------------------------------------------------------
CONTENT_PATH=/qar/content
DISKS_PATH=/qar/disks
DOWNLOADS_PATH=/qar/downloads
CONFIG_PATH=/qar/config

# Default disk name (used when no external disks have the content)
DEFAULT_DISK=default

# Trash directory for deleted files
TRASH_PATH=/qar/disks/default/.trash

# --------------------------------------------------------------------------
# API Keys
# --------------------------------------------------------------------------
# OMDB API Key (get one at https://www.omdbapi.com/apikey.aspx)
OMDB_API_KEY=

# OpenRouter AI Configuration (get a key at https://openrouter.ai/)
OPENROUTER_API_KEY=
OPENROUTER_CHAT_MODEL=qwen/qwen3-8b

# --------------------------------------------------------------------------
# Frontend
# --------------------------------------------------------------------------
# Backend URL the frontend uses for API proxy (for native installs, localhost)
BACKEND_URL=http://localhost:3001

# Frontend server port
FRONTEND_PORT=3000

# --------------------------------------------------------------------------
# Tor (used for torrent search privacy)
# --------------------------------------------------------------------------
TOR_HOST=127.0.0.1
TOR_PORT=9050

# --------------------------------------------------------------------------
# VPN (for QBittorrent traffic privacy)
# --------------------------------------------------------------------------
# For native installs, set up a system-level VPN (WireGuard or OpenVPN)
# and route QBittorrent traffic through it. See the README for details.
#
# PIA VPN region (used by VPN startup scripts if running PIA)
# VPN_REGION=greenland
# PORT_FORWARDING=true
#
# VPN credentials file (PIA username/password, one per line)
# VPN_AUTH_FILE=/qar/config/auth.conf
